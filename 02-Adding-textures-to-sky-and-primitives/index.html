<!DOCTYPE html>
<html>
  <head>
    <title>Textures - A-Frame School</title>
    <meta name="description" content="Textures - A-Frame School">
    <script src="https://aframe.io/releases/0.5.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="umbrella" arc = "Assets/umbrella.png" alt = "">
        <img id="sky" arc = "Assets/equi.jpg" alt ="">
      </a-assets>

        <a-box src="#sand" position = "-1 0.5 -4"></a-box>
        <a-box src="#sand" position = "-1 0.5 -4"></a-box>
        <a-box src="#sand" position = "-1 1 -4"></a-box>
        <a-box src="#sand" position = "0 0.5 -4"></a-box>
        <a-sky src="#sky"></a-sky>

    </a-scene>
  </body>
</html>
