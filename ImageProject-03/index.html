<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

    <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
  </head>

  <body>
    <a-scene background="color: #111">

      <a-assets>
        <img id="sky" src="Assets/christmas_sky.jpg">
        <a-asset-item id="tree" src="Assets/tree.glb"></a-asset-item>
        <a-asset-item id="box" src="Assets/box.glb"></a-asset-item>
      </a-assets>

      <a-sky src="#sky"></a-sky>


      <a-entity gltf-model="#tree"
                position="0 0 -10"
                scale="4 4 4"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 10000">
      </a-entity>

      <a-entity gltf-model="#box"
                position="4 0 -9"
                scale="0.6 0.6 0.6"
                event-set__enter="_event: mouseenter; scale: 0.8 0.8 0.8"
                event-set__leave="_event: mouseleave; scale: 0.6 0.6 0.6">
      </a-entity>

      <a-plane rotation="-90 0 0"
               width="30"
               height="30"
               color="#ffffff">
      </a-plane>

    </a-scene>
  </body>
</html>
