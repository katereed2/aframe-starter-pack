<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="umbrellaTex" src="./Assets/rainbow.png">
        <img id="usTex" src="./Assets/us.png">
        <img id="shellTex" src="./Assets/shell.png">
        <img id="sky" src="./Assets/equi4.jpg">
      </a-assets>

      <a-sky src="#sky"></a-sky>

      <a-plane position="0 0 -4" rotation="-90 0 0" width="12" height="12" color="#EED9A0"></a-plane>

      <a-cylinder position="-2 1 -4" radius="0.1" height="2" color="#8B5A2B"></a-cylinder>

      <a-cone position="-2 2.5 -4" radius-bottom="1.5" height="1.5"
        material="src: #umbrellaTex; color: white; side: double;">
      </a-cone>

      <a-cylinder position="0 1 -4" radius="0.5" height="2"
        material="src: #usTex; color: white;">
      </a-cylinder>

      <a-sphere position="2 0.7 -4" radius="0.7"
        material="src: #shellTex; color: white;">
      </a-sphere>

    </a-scene>
  </body>
</html>
